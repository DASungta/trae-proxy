# trae-proxy configuration

# HTTPS listen address
listen = ":443"

# Domain to hijack via /etc/hosts
hijack = "openrouter.ai"

# Log level: error | warn | info (default) | debug | trace
log_level = "info"

# When true, the trace level prints full request/response bodies.
log_body = false

# Upstream config (supports multiple named upstreams)
[upstreams.default]
url = "http://192.168.48.12:8080"
protocol = "anthropic"
default = true

# Multi-upstream example:
# [upstreams.openai_official]
# url = "https://api.openai.com"
# protocol = "openai"

# When true, GET /v1/models forwards to the real hijack domain (bypassing /etc/hosts)
# instead of returning the fake list from [models] below.
# real_models = false

[models]
# Old format: uses default upstream
"anthropic/claude-sonnet-4.6" = "claude-sonnet-4.6"
# New format: route to specific upstream
# "openai/gpt-4o" = { upstream = "openai_official", model = "gpt-4o" }
